<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      body {
        display: grid;
        gap: 1em;

        grid-template-columns: repeat(3, 150px);
        grid-template-rows: repeat(2, 150px);
      }

      section {
        border: 1px solid black;
        border-radius: 10%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);

        width: 100%;

        justify-items: center;
        align-items: center;
      }

      section:nth-child(1) {
        div {
          grid-area: 2/2;
        }
      }

      section:nth-child(2) {
        div:nth-child(1) {
          grid-area: 1/3;
        }

        div:nth-child(2) {
          grid-area: 3/1;
        }
      }

      section:nth-child(3) {
        div:nth-child(1) {
          grid-area: 1/1;
        }

        div:nth-child(2) {
          grid-area: 2/2;
        }

        div:nth-child(3) {
          grid-area: 3/3;
        }
      }

      section:nth-child(4) {
        div:nth-child(1) {
          grid-area: 1/1;
        }

        div:nth-child(2) {
          grid-area: 1/3;
        }

        div:nth-child(3) {
          grid-area: 3/1;
        }

        div:nth-child(4) {
          grid-area: 3/3;
        }
      }

      section:nth-child(5) {
        div:nth-child(1) {
          grid-area: 1/1;
        }

        div:nth-child(2) {
          grid-area: 1/3;
        }

        div:nth-child(3) {
          grid-area: 3/1;
        }

        div:nth-child(4) {
          grid-area: 3/3;
        }

        div:nth-child(5) {
          grid-area: 2/2;
        }
      }

      section:nth-child(6) {
        div:nth-child(1) {
          grid-area: 1/1;
        }

        div:nth-child(2) {
          grid-area: 1/2;
        }

        div:nth-child(3) {
          grid-area: 1/3;
        }

        div:nth-child(4) {
          grid-area: 3/1;
        }

        div:nth-child(5) {
          grid-area: 3/2;
        }

        div:nth-child(6) {
          grid-area: 3/3;
        }
      }

      div {
        background-color: black;
        width: 30px;
        height: 30px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <section>
      <div></div>
    </section>
    <section>
      <div></div>
      <div></div>
    </section>
    <section>
      <div></div>
      <div></div>
      <div></div>
    </section>
    <section>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </section>
    <section>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </section>
    <section>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </section>
  </body>
</html>
